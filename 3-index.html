<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Accessible Form</title>
</head>
<body>
  <header>
    <h1>Welcome to My Page</h1>
  </header>

  <main>
    <!-- Existing content from 2-index.html goes here -->

    <section>
      <h2 id="form-title">Contact Form</h2>
      <form action="#" method="POST" aria-labelledby="form-title" role="form">
        
        <div>
          <label for="name">Name:</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            aria-required="true">
        </div>

        <div>
          <label for="email">Email:</label>
          <input 
            type="text" 
            id="email" 
            name="email" 
            aria-required="true">
        </div>

        <div>
          <button type="submit" aria-label="Submit the form">Submit</button>
        </div>

        <div aria-live="polite" role="alert"></div>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 My Website</p>
  </footer>
</body>
</html>
